<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensory Word Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .transform-style-3d { transform-style: preserve-3d; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-container {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 md:p-8 flex flex-col items-center">

    <header class="max-w-4xl w-full mb-8 text-center">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Sensory Word Master</h1>
        <p class="text-slate-500 italic">"Explore the world through your five senses"</p>
    </header>

    <!-- Category Tabs -->
    <div id="category-tabs" class="flex flex-wrap justify-center gap-2 mb-8 max-w-4xl">
        <button onclick="setCategory('All')" class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-indigo-600 text-white shadow-md" data-category="All">All</button>
        <button onclick="setCategory('Sight')" class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200" data-category="Sight">Sight</button>
        <button onclick="setCategory('Smell')" class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200" data-category="Smell">Smell</button>
        <button onclick="setCategory('Touch')" class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200" data-category="Touch">Touch</button>
        <button onclick="setCategory('Hearing')" class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200" data-category="Hearing">Hearing</button>
        <button onclick="setCategory('Taste')" class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-white text-slate-600 hover:bg-slate-100 border border-slate-200" data-category="Taste">Taste</button>
    </div>

    <!-- Flashcard Container -->
    <div class="relative w-full max-w-lg aspect-[4/5] md:aspect-[3/2] perspective-1000">
        <div id="card" class="card-container relative w-full h-full transform-style-3d cursor-pointer shadow-xl rounded-3xl" onclick="toggleFlip()">
            
            <!-- Front Side -->
            <div class="absolute inset-0 backface-hidden bg-white rounded-3xl border-2 border-slate-100 flex flex-col items-center justify-center p-8">
                <span id="card-category" class="absolute top-6 left-6 px-3 py-1 rounded-full bg-slate-100 text-xs font-bold text-slate-400 uppercase tracking-widest">SIGHT</span>
                <div id="card-icon" class="text-indigo-600 mb-4 opacity-20">
                    <!-- SVG Icon will be injected here -->
                </div>
                <h2 id="card-word" class="text-4xl md:text-5xl font-bold text-center text-slate-800 mb-6">Word</h2>
                <button onclick="event.stopPropagation(); speakWord()" class="p-4 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                </button>
                <p class="absolute bottom-8 text-slate-400 text-sm">Click to see meaning</p>
            </div>

            <!-- Back Side -->
            <div class="absolute inset-0 backface-hidden rotate-y-180 bg-white rounded-3xl border-2 border-indigo-100 p-6 md:p-8 overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-indigo-600 font-bold text-lg"><span id="back-word">Word</span> <span id="back-pos" class="text-slate-400 text-sm font-normal">[adj.]</span></span>
                    <span id="back-kr" class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-md text-sm font-bold">뜻</span>
                </div>

                <div class="space-y-6">
                    <section class="bg-slate-50 p-4 rounded-xl text-left">
                        <h4 class="text-xs font-bold text-slate-400 uppercase mb-2">English Definition</h4>
                        <p id="back-def" class="text-slate-800 font-medium leading-relaxed">Definition...</p>
                        <div class="mt-2 pt-2 border-t border-slate-200">
                            <p id="back-def-kr" class="text-slate-500 text-sm italic">직역: ...</p>
                        </div>
                    </section>

                    <section class="bg-indigo-50 p-4 rounded-xl relative text-left">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="text-xs font-bold text-indigo-400 uppercase">Example Sentence</h4>
                            <button onclick="event.stopPropagation(); speakSentence()" class="p-2 bg-white text-indigo-600 rounded-full shadow-sm hover:scale-110 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                            </button>
                        </div>
                        <p id="back-sentence" class="text-indigo-900 font-semibold leading-relaxed mb-2">Sentence...</p>
                        <div class="pt-2 border-t border-indigo-100">
                            <p id="back-sentence-kr" class="text-indigo-700 text-sm italic">직역: ...</p>
                        </div>
                    </section>
                </div>
                <p class="text-center mt-6 text-slate-400 text-xs">Click to flip back</p>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-8 mt-12">
        <button onclick="prevCard()" class="p-3 rounded-full bg-white shadow-md hover:bg-slate-50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span id="progress-text" class="text-slate-500 font-medium">1 / 25</span>
        <button onclick="nextCard()" class="p-3 rounded-full bg-white shadow-md hover:bg-slate-50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <button onclick="resetProgress()" class="mt-8 flex items-center gap-2 text-slate-400 hover:text-indigo-600 transition-colors text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        Reset Progress
    </button>

    <script>
        const wordData = [
            // SIGHT
            { category: 'Sight', word: 'golden-brown', pos: 'adj.', kr: '황금빛 갈색의', def: 'Having the color of gold mixed with brown.', def_kr: '금색과 갈색이 섞인 색을 가진.', sentence: 'Bake the cookies until they are golden-brown.', sentence_kr: '쿠키를 구우세요 / 그것들이 황금빛 갈색이 될 때까지.' },
            { category: 'Sight', word: 'shell-like', pos: 'adj.', kr: '조개껍데기 같은', def: 'Having a shape or texture like a sea shell.', def_kr: '모양이나 질감을 가진 / 바다 조개껍데기 같은.', sentence: 'The pastry has a delicate, shell-like pattern.', sentence_kr: '그 페이스트리는 가지고 있다 / 섬세한, 조개껍데기 같은 무늬를.' },
            { category: 'Sight', word: 'plump', pos: 'adj.', kr: '통통한/속이 꽉 찬', def: 'Having a full, rounded shape.', def_kr: '가득 차고, 둥근 모양을 가진.', sentence: 'The plump blueberries were sweet and juicy.', sentence_kr: '그 통통한 블루베리들은 / 달콤하고 즙이 많았다.' },
            { category: 'Sight', word: 'domed', pos: 'adj.', kr: '돔 모양의/반구형의', def: 'Shaped like a dome or a hemisphere.', def_kr: '돔이나 반구처럼 모양이 형성된.', sentence: 'The cake had a perfectly domed top.', sentence_kr: '그 케이크는 가졌다 / 완벽하게 돔 모양인 윗부분을.' },
            { category: 'Sight', word: 'porous', pos: 'adj.', kr: '구멍이 많은/투과성의', def: 'Having small holes that allow air or liquid to pass through.', def_kr: '작은 구멍들을 가진 / 공기나 액체가 통과하도록 허용하는.', sentence: 'Sponges are very porous materials.', sentence_kr: '스펀지는 매우 구멍이 많은 물질이다.' },

            // SMELL
            { category: 'Smell', word: 'fragrant', pos: 'adj.', kr: '향기로운', def: 'Having a pleasant or sweet smell.', def_kr: '즐겁거나 달콤한 냄새를 가진.', sentence: 'The garden was filled with fragrant roses.', sentence_kr: '그 정원은 가득 차 있었다 / 향기로운 장미들로.' },
            { category: 'Smell', word: 'faint', pos: 'adj.', kr: '희미한/약한', def: 'Not strong or clear; slight.', def_kr: '강하거나 명확하지 않은; 약간의.', sentence: 'There was a faint smell of vanilla in the kitchen.', sentence_kr: '희미한 바닐라 냄새가 있었다 / 부엌 안에.' },
            { category: 'Smell', word: 'strong', pos: 'adj.', kr: '강한/강렬한', def: 'Having a powerful effect on the senses.', def_kr: '감각에 강력한 효과를 주는.', sentence: 'The strong scent of coffee woke me up.', sentence_kr: '그 강한 커피 향이 / 나를 깨웠다.' },
            { category: 'Smell', word: 'smells like', pos: 'phrase', kr: '~같은 냄새가 나다', def: 'To emit an odor similar to something else.', def_kr: '냄새를 내뿜다 / 다른 무언가와 유사한.', sentence: 'This candle smells like fresh lavender.', sentence_kr: '이 양초는 ~같은 냄새가 난다 / 신선한 라벤더.' },
            { category: 'Smell', word: 'a Sunday morning', pos: 'noun phrase', kr: '일요일 아침 (같은 느낌)', def: 'A metaphor for a clean, calm, and fresh atmosphere.', def_kr: '깨끗하고, 평온하며, 신선한 분위기에 대한 은유.', sentence: 'The house smells like a Sunday morning.', sentence_kr: '그 집은 ~같은 냄새가 난다 / 일요일 아침.' },

            // TOUCH
            { category: 'Touch', word: 'springy', pos: 'adj.', kr: '탄력 있는', def: 'Returning to its original shape after being pressed.', def_kr: '원래의 모양으로 돌아가는 / 눌린 이후에.', sentence: 'The moss felt soft and springy under my feet.', sentence_kr: '그 이끼는 부드럽고 탄력 있게 느껴졌다 / 내 발아래에서.' },
            { category: 'Touch', word: 'sticky', pos: 'adj.', kr: '끈적거리는', def: 'Tending to adhere or stick to things.', def_kr: '사물들에 달라붙거나 고수하는 경향이 있는.', sentence: 'My hands are sticky from the honey.', sentence_kr: '내 손은 끈적거린다 / 꿀 때문에.' },
            { category: 'Touch', word: 'firm', pos: 'adj.', kr: '단단한/딱딱한', def: 'Solid and not yielding to pressure.', def_kr: '고체이고 압력에 굴복하지 않는.', sentence: 'The peach is ripe but still firm.', sentence_kr: '그 복숭아는 익었지만 / 여전히 단단하다.' },
            { category: 'Touch', word: 'moist', pos: 'adj.', kr: '촉촉한/습기 있는', def: 'Slightly wet or damp.', def_kr: '약간 젖었거나 축축한.', sentence: 'The cake was incredibly moist and delicious.', sentence_kr: '그 케이크는 믿을 수 없을 정도로 촉촉하고 맛있었다.' },
            { category: 'Touch', word: 'fluffy', pos: 'adj.', kr: '솜털 같은/푹신한', def: 'Feeling very light and soft.', def_kr: '매우 가볍고 부드럽게 느껴지는.', sentence: 'I love sleeping on fluffy pillows.', sentence_kr: '나는 푹신한 베개 위에서 자는 것을 사랑한다.' },
            { category: 'Touch', word: 'spongy', pos: 'adj.', kr: '스펀지 같은/폭신한', def: 'Soft and porous like a sponge.', def_kr: '부드럽고 구멍이 많은 / 스펀지처럼.', sentence: 'The ground was spongy after the rain.', sentence_kr: '그 땅은 폭신폭신했다 / 비가 온 뒤에.' },

            // HEARING
            { category: 'Hearing', word: 'sizzling', pos: 'adj.', kr: '지글지글 소리 나는', def: 'Making a sound like food frying in hot fat.', def_kr: '소리를 만드는 / 뜨거운 지방에서 튀겨지는 음식 같은.', sentence: 'The sizzling steak sounded amazing.', sentence_kr: '그 지글거리는 스테이크는 / 놀라운 소리가 났다.' },
            { category: 'Hearing', word: 'silent', pos: 'adj.', kr: '조용한/침묵하는', def: 'Making no sound at all.', def_kr: '전혀 소리를 내지 않는.', sentence: 'The library was completely silent.', sentence_kr: '그 도서관은 완전히 조용했다.' },
            { category: 'Hearing', word: 'squish', pos: 'noun/verb', kr: '으깨지는 소리/철벅 소리', def: 'A soft squelching sound.', def_kr: '부드럽게 짓눌리는 소리.', sentence: 'I heard a squish when I stepped in the mud.', sentence_kr: '나는 철벅 하는 소리를 들었다 / 내가 진흙을 밟았을 때.' },

            // TASTE
            { category: 'Taste', word: 'buttery', pos: 'adj.', kr: '버터 맛이 나는/고소한', def: 'Containing or tasting like butter.', def_kr: '버터를 포함하거나 버터 같은 맛이 나는.', sentence: 'The croissants are very buttery.', sentence_kr: '그 크루아상들은 매우 버터 맛이 난다.' },
            { category: 'Taste', word: 'sweet', pos: 'adj.', kr: '달콤한', def: 'Having the taste of sugar or honey.', def_kr: '설탕이나 꿀의 맛을 가진.', sentence: 'This apple is very sweet.', sentence_kr: '이 사과는 매우 달콤하다.' },
            { category: 'Taste', word: 'rich', pos: 'adj.', kr: '풍부한/기름진', def: 'Containing a lot of fat, sugar, or eggs.', def_kr: '많은 지방, 설탕, 또는 달걀을 포함하는.', sentence: 'The chocolate cake was too rich for me.', sentence_kr: '그 초콜릿 케이크는 너무 풍부했다(기름졌다) / 나에게는.' },
            { category: 'Taste', word: 'zesty', pos: 'adj.', kr: '자극적인/풍미가 강한', def: 'Having a strong, pleasant, and somewhat spicy flavor.', def_kr: '강하고, 즐거우며, 다소 매콤한 풍미를 가진.', sentence: 'The lemon sauce has a zesty flavor.', sentence_kr: '그 레몬 소스는 자극적인 풍미를 가지고 있다.' },
            { category: 'Taste', word: 'nutty', pos: 'adj.', kr: '견과류 맛이 나는/고소한', def: 'Tasting like or containing nuts.', def_kr: '견과류 같은 맛이 나거나 견과류를 포함하는.', sentence: 'The cheese has a slightly nutty taste.', sentence_kr: '그 치즈는 약간 고소한(견과류 같은) 맛이 난다.' },
            { category: 'Taste', word: 'subtle', pos: 'adj.', kr: '미묘한/은은한', def: 'Not loud, bright, noticeable, or obvious.', def_kr: '크거나, 밝거나, 눈에 띄거나, 명백하지 않은.', sentence: 'There is a subtle hint of cinnamon in the tea.', sentence_kr: '미묘한 계피의 흔적이 있다 / 그 차 안에.' }
        ];

        const icons = {
            Sight: '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>',
            Smell: '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 3.3 3.3l-3.3-3.3z"></path><path d="m3 21 3-3"></path><path d="m14 10-1.8 1.8a2.5 2.5 0 1 1-3.5-3.5L10.5 6.5"></path><path d="m13 13-3 3"></path><path d="m18 8-1.5 1.5"></path></svg>',
            Touch: '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg>',
            Hearing: '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3 3 0 1 1-6 0c0-4 6-4 6-10Z"></path><path d="M15 8.5a2.5 2.5 0 0 0-5 0"></path></svg>',
            Taste: '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path></svg>'
        };

        let currentCategory = 'All';
        let currentIndex = 0;
        let isFlipped = false;
        let filteredWords = wordData;

        function updateCard() {
            const card = filteredWords[currentIndex];
            document.getElementById('card-category').innerText = card.category;
            document.getElementById('card-word').innerText = card.word;
            document.getElementById('card-icon').innerHTML = icons[card.category];
            
            document.getElementById('back-word').innerText = card.word;
            document.getElementById('back-pos').innerText = `[${card.pos}]`;
            document.getElementById('back-kr').innerText = card.kr;
            document.getElementById('back-def').innerText = card.def;
            document.getElementById('back-def-kr').innerText = `직역: ${card.def_kr}`;
            document.getElementById('back-sentence').innerText = card.sentence;
            document.getElementById('back-sentence-kr').innerText = `직역: ${card.sentence_kr}`;

            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${filteredWords.length}`;
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            const cardElement = document.getElementById('card');
            if (isFlipped) {
                cardElement.classList.add('rotate-y-180');
            } else {
                cardElement.classList.remove('rotate-y-180');
            }
        }

        function nextCard() {
            if (isFlipped) toggleFlip();
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % filteredWords.length;
                updateCard();
            }, isFlipped ? 300 : 0);
        }

        function prevCard() {
            if (isFlipped) toggleFlip();
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length;
                updateCard();
            }, isFlipped ? 300 : 0);
        }

        function setCategory(cat) {
            currentCategory = cat;
            if (cat === 'All') {
                filteredWords = wordData;
            } else {
                filteredWords = wordData.filter(w => w.category === cat);
            }
            currentIndex = 0;
            if (isFlipped) toggleFlip();
            
            // Update UI buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.getAttribute('data-category') === cat) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-white', 'text-slate-600');
                } else {
                    btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                    btn.classList.add('bg-white', 'text-slate-600');
                }
            });
            
            updateCard();
        }

        function speakWord() {
            const utterance = new SpeechSynthesisUtterance(filteredWords[currentIndex].word);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function speakSentence() {
            const utterance = new SpeechSynthesisUtterance(filteredWords[currentIndex].sentence);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function resetProgress() {
            setCategory('All');
        }

        // Initialize
        updateCard();
    </script>
</body>
</html>
